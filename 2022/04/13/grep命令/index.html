<p>今天用到grep搜索遇到一个问题，我只想找到peak_91所在的行，但结果有很多包含这个字符串的行。<br><img src="https://cdn.nlark.com/yuque/0/2022/png/27625712/1649844967888-ec13fad6-4813-4122-a2b8-6845842706f8.png#clientId=ud64c8ad0-51d1-4&crop=0&crop=0&crop=1&crop=1&from=paste&height=301&id=uc68bef24&margin=%5Bobject%20Object%5D&name=image.png&originHeight=376&originWidth=696&originalType=binary&ratio=1&rotation=0&showTitle=false&size=101896&status=done&style=none&taskId=ucdc4f402-8922-442f-89e2-de35eb35fbe&title=&width=556.8" alt="image.png"><br>解决这个，只需要加上-w参数即可<br><img src="https://cdn.nlark.com/yuque/0/2022/png/27625712/1649844992379-2fcf58da-0260-429e-9ee3-dd117230de79.png#clientId=ud64c8ad0-51d1-4&crop=0&crop=0&crop=1&crop=1&from=paste&height=37&id=u902f7af5&margin=%5Bobject%20Object%5D&name=image.png&originHeight=46&originWidth=734&originalType=binary&ratio=1&rotation=0&showTitle=false&size=16901&status=done&style=none&taskId=u272bdc48-916d-4559-98a1-2b799ab3129&title=&width=587.2" alt="image.png"><br>如图。</p>
